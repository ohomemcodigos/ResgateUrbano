name: resgate_urbano
description: "Aplicativo desenvolvido em Flutter para cidadãos registrarem problemas urbanos em tempo real."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  
  # UI & Navigation
  go_router: ^13.0.0
  intl: ^0.19.0
  
  # Image handling
  image_picker: ^1.0.0
  
  # Utilities
  uuid: ^4.0.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # Drift code generation
  build_runner: ^2.4.0
  drift_dev: ^2.14.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
